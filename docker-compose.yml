services:
  freemannotes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freemannotes
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 27015
      # Set this to your public URL for clearer startup logs only.
      # APP_URL: https://dev.freeman.daxtond.com
      # Keep empty to disable server-side LevelDB persistence.
      # YPERSISTENCE: ""
      YPERSISTENCE: /data/yjs
    ports:
      - "27015:27015"
    volumes:
      - freemannotes-yjs:/data/yjs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:27015/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  freemannotes-yjs:
